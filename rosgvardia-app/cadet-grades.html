<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мои оценки | Кадет | Росгвардия</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=Bitter:wght@400;700&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Roboto', sans-serif; background: #f5f1e8; }
        
        /* Стили для печати */
        @media print {
            .no-print { display: none !important; }
            body { background: white; margin: 0; padding: 20px; }
            .grades-card { box-shadow: none; padding: 0; }
            .grade-table th { background: #f0f0f0; }
            .grade-table td, .grade-table th { border: 1px solid #ccc; }
            .cadet-header { background: #1a2e3f !important; color: white !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .user-info-wrapper { background: #c9a45a !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .page-header { margin-bottom: 20px; }
            .page-header h2 { color: #3d2b1a; }
            .page-header p { color: #666; }
        }
        
        .cadet-header {
            background: linear-gradient(145deg, #1a2e3f, #2b4a5c);
            padding: 1rem 2rem;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .cadet-header h1 { font-family: 'Montserrat', sans-serif; font-size: 1.3rem; }
        
        .user-section {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .user-info-wrapper {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #c9a45a;
            padding: 5px 15px;
            border-radius: 30px;
        }
        .cadet-avatar { width: 36px; height: 36px; border-radius: 50%; object-fit: cover; border: 2px solid #fff; }
        .cadet-avatar-placeholder { width: 36px; height: 36px; background: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; }
        .user-name-text { font-size: 14px; font-weight: 600; color: #1a2e3f; }
        .logout-btn { background: #c9a45a; color: #1a2e3f; border: none; padding: 5px 15px; border-radius: 30px; cursor: pointer; font-weight: 600; }
        .logout-btn:hover { background: #b8944a; }
        
        .cadet-nav {
            background: white;
            padding: 0.8rem 2rem;
            border-bottom: 2px solid #c9a45a;
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
        }
        .cadet-nav a {
            color: #3d2b1a;
            text-decoration: none;
            font-weight: 600;
            padding: 0.5rem 1rem;
            border-radius: 2rem;
            transition: all 0.3s;
        }
        .cadet-nav a:hover, .cadet-nav a.active {
            background: #c9a45a;
            color: white;
        }
        
        .container { max-width: 1200px; margin: 0 auto; padding: 2rem; }
        .page-header { text-align: center; margin-bottom: 2rem; }
        .page-header h2 { font-size: 2rem; color: #3d2b1a; font-family: 'Montserrat', sans-serif; }
        .page-header p { color: #666; margin-top: 0.5rem; }
        
        .grades-card {
            background: white;
            border-radius: 1.5rem;
            padding: 2rem;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        .stats-summary {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            margin-bottom: 2rem;
        }
        .stat-card {
            background: #f5efe6;
            border-radius: 1rem;
            padding: 1rem;
            text-align: center;
            flex: 1;
            min-width: 120px;
            border-left: 4px solid #c9a45a;
        }
        .stat-number { font-size: 2rem; font-weight: 800; color: #3d2b1a; }
        .stat-label { font-size: 0.7rem; color: #666; }
        
        .grade-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
        }
        .grade-table th, .grade-table td {
            padding: 12px;
            text-align: center;
            border-bottom: 1px solid #e0d0c0;
        }
        .grade-table th {
            background: #f5efe6;
            font-weight: 600;
            color: #3d2b1a;
        }
        .grade-badge {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 25px;
            font-size: 14px;
            font-weight: 600;
        }
        .grade-5 { background: #d4edda; color: #155724; }
        .grade-4 { background: #cce5ff; color: #004085; }
        .grade-3 { background: #fff3cd; color: #856404; }
        .grade-2 { background: #f8d7da; color: #721c24; }
        .grade-none { background: #f0f0f0; color: #999; }
        
        .btn-print {
            background: #c9a45a;
            color: #3d2b1a;
            border: none;
            padding: 10px 24px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            margin-top: 1.5rem;
            display: inline-block;
        }
        .btn-print:hover { background: #b8944a; transform: scale(1.02); }
        
        .simple-footer {
            background: #212121;
            padding: 1.5rem;
            text-align: center;
            color: #888;
            margin-top: 2rem;
        }
        
        @media (max-width: 768px) {
            .cadet-header { flex-direction: column; gap: 0.5rem; text-align: center; }
            .cadet-nav { justify-content: center; }
            .container { padding: 1rem; }
            .grade-table th, .grade-table td { padding: 8px 4px; font-size: 11px; }
        }
    </style>
    <!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#880000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Росгвардия">
<link rel="apple-touch-icon" href="icons/icon-192.png">
</head>
<body>
    <!-- Шапка - ОСТАЁТСЯ при печати, скрываем только кнопку выхода -->
    <div class="cadet-header">
        <h1>⚜️ Росгвардия — мои горизонты</h1>
        <div class="user-section">
            <div class="user-info-wrapper" id="userInfoWrapper"></div>
            <button class="logout-btn no-print" onclick="logout()">Выйти</button>
        </div>
    </div>
    
    <!-- Навигация - СКРЫВАЕТСЯ при печати -->
    <div class="cadet-nav no-print">
        <a href="cadet-courses.html">📚 Курс занятий</a>
        <a href="cadet-institutes.html">🏛️ Институты ВНГ РФ</a>
        <a href="cadet-grades.html" class="active">📊 Мои оценки</a>
        <a href="cadet-chat.html">💬 Чат</a>
    </div>
    
    <div class="container">
        <!-- Заголовок страницы - ОСТАЁТСЯ при печати (убрали класс no-print) -->
        <div class="page-header">
            <h2>📊 Мои оценки</h2>
            <p>Успеваемость по курсу «Росгвардия — мои горизонты»</p>
        </div>
        
        <div class="grades-card">
            <div id="statsContainer"></div>
            <div id="gradesTable"></div>
            <!-- Кнопка печати - СКРЫВАЕТСЯ при печати -->
            <div style="text-align: center;" class="no-print">
                <button class="btn-print" onclick="window.print()">🖨️ Распечатать</button>
            </div>
        </div>
    </div>
    
    <!-- Футер - СКРЫВАЕТСЯ при печати -->
    <footer class="simple-footer no-print">
        <p>© 2026 Росгвардия. Все права защищены.</p>
    </footer>

    <script src="app.js"></script>
    <script>
        const topicNames = {
            1: "Росгвардия", 2: "Герой Романов", 3: "Инженерные войска",
            4: "Атомная отрасль", 5: "Космическая отрасль", 6: "Аграрная Россия",
            7: "Энергетика", 8: "Граф Комаровский", 9: "Оборонная промышленность",
            10: "Честь и мужество", 11: "Инженер-испытатель", 12: "Кинологическая служба"
        };
        
        function getGradeClass(grade) {
            if (grade === 5) return "grade-5";
            if (grade === 4) return "grade-4";
            if (grade === 3) return "grade-3";
            if (grade === 2) return "grade-2";
            return "grade-none";
        }
        
        function logout() {
            sessionStorage.removeItem('currentUser');
            window.location.href = 'login.html';
        }
        
        (function() {
            const user = getCurrentUser();
            if (!user || user.role !== 'cadet') {
                window.location.href = 'login.html';
                return;
            }
            
            // Аватар
            const cadetPhotoUrl = typeof getCadetPhoto === 'function' ? getCadetPhoto(user.id) : null;
            let avatarHtml = '';
            if (cadetPhotoUrl) {
                avatarHtml = `<img src="${cadetPhotoUrl}" class="cadet-avatar">`;
            } else {
                avatarHtml = `<div class="cadet-avatar-placeholder">🎓</div>`;
            }
            document.getElementById('userInfoWrapper').innerHTML = `${avatarHtml}<span class="user-name-text">${user.name} (взвод №${user.platoon})</span>`;
            
            // Получаем оценки кадета
            const results = JSON.parse(localStorage.getItem('testResults') || '[]');
            const myResults = results.filter(r => r.cadetId === user.id);
            
            // Статистика
            let totalTests = myResults.length;
            let grade5 = 0, grade4 = 0, grade3 = 0, grade2 = 0;
            let totalScore = 0;
            
            myResults.forEach(r => {
                if (r.score === 5) grade5++;
                else if (r.score === 4) grade4++;
                else if (r.score === 3) grade3++;
                else if (r.score <= 2) grade2++;
                totalScore += r.score;
            });
            
            let avgGrade = totalTests > 0 ? (totalScore / totalTests).toFixed(1) : "—";
            let percentComplete = Math.round(totalTests / 12 * 100);
            
            document.getElementById('statsContainer').innerHTML = `
                <div class="stats-summary">
                    <div class="stat-card"><div class="stat-number">${totalTests}/12</div><div class="stat-label">Пройдено тем</div></div>
                    <div class="stat-card"><div class="stat-number">${percentComplete}%</div><div class="stat-label">Освоенность курса</div></div>
                    <div class="stat-card"><div class="stat-number">${avgGrade}</div><div class="stat-label">Средний балл</div></div>
                </div>
                <div class="stats-summary">
                    <div class="stat-card"><div class="stat-number">${grade5}</div><div class="stat-label">Оценок "5"</div></div>
                    <div class="stat-card"><div class="stat-number">${grade4}</div><div class="stat-label">Оценок "4"</div></div>
                    <div class="stat-card"><div class="stat-number">${grade3}</div><div class="stat-label">Оценок "3"</div></div>
                    <div class="stat-card"><div class="stat-number">${grade2}</div><div class="stat-label">Оценок "2"</div></div>
                </div>
            `;
            
            // Таблица оценок
            let gradesHtml = '<table class="grade-table"><thead><table><th>№</th><th>Тема занятия</th><th>Оценка</th><th>Результат</th><th>Дата прохождения</th></tr></thead><tbody>';
            
            for (let t = 1; t <= 12; t++) {
                const result = myResults.find(r => r.topicId === t);
                let gradeText = "—";
                let gradeClass = "grade-none";
                let scoreText = "Не пройдено";
                let dateText = "—";
                
                if (result) {
                    if (result.score <= 2) { gradeText = "2"; gradeClass = "grade-2"; }
                    else if (result.score === 3) { gradeText = "3"; gradeClass = "grade-3"; }
                    else if (result.score === 4) { gradeText = "4"; gradeClass = "grade-4"; }
                    else if (result.score === 5) { gradeText = "5"; gradeClass = "grade-5"; }
                    scoreText = `${result.score}/${result.totalQuestions} правильных`;
                    dateText = new Date(result.completedAt).toLocaleDateString();
                }
                
                gradesHtml += `
                    <tr>
                        <td style="text-align:center">${t}</td>
                        <td style="text-align:left">${topicNames[t]}</td>
                        <td style="text-align:center"><span class="grade-badge ${gradeClass}">${gradeText}</span></td>
                        <td style="text-align:center">${scoreText}</td>
                        <td style="text-align:center">${dateText}</td>
                    </tr>
                `;
            }
            
            gradesHtml += '</tbody></tr>';
            document.getElementById('gradesTable').innerHTML = gradesHtml;
        })();
        // ========== СЧЕТЧИК СООБЩЕНИЙ ДЛЯ КАДЕТА ==========
function updateChatBadge() {
    var user = getCurrentUser();
    if (!user || user.role !== 'cadet') return;
    
    var unreadCount = typeof getTotalUnreadCount === 'function' ? getTotalUnreadCount(user.id) : 0;
    var cadetNav = document.querySelector('.cadet-nav');
    
    if (cadetNav) {
        var chatLink = cadetNav.querySelector('a[href="cadet-chat.html"]');
        if (chatLink) {
            var oldBadge = chatLink.querySelector('.chat-badge');
            if (oldBadge) oldBadge.remove();
            if (unreadCount > 0) {
                var badge = document.createElement('span');
                badge.className = 'chat-badge';
                badge.style.cssText = 'background: #c00; color: white; border-radius: 50%; padding: 2px 8px; font-size: 11px; margin-left: 8px; font-weight: bold; display: inline-block; min-width: 18px; text-align: center;';
                badge.textContent = unreadCount > 99 ? '99+' : unreadCount;
                chatLink.appendChild(badge);
            }
        }
    }
}
// Слушаем изменения в localStorage (мгновенная синхронизация между вкладками)
window.addEventListener('storage', function(e) {
    if (e.key === 'chatMessagesUpdated' || e.key === 'chatMessages') {
        updateChatBadge();
    }
});

// Запускаем обновление счетчика
updateChatBadge();
    </script>
    
</body>
</html>
