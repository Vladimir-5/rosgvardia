                { question: "Сколько лет граф Комаровский руководил Отдельным корпусом внутренней стражи?", options: ["15 лет", "10 лет", "5 лет"], correct: 0 }
            ],
            9: [
                { question: "Что означает аббревиатура ОПК?", options: ["Оборонно-промышленный комплекс", "Оперативный комплекс", "Оборонный корпус"], correct: 0 },
                { question: "Какой бронированный автомобиль используется в Росгвардии?", options: ["Тигр", "Жигули", "Волга"], correct: 0 },
                { question: "Что производят на оборонных заводах?", options: ["Военную технику", "Мебель", "Одежду"], correct: 0 },
                { question: "Какая профессия нужна в судостроении?", options: ["Корабельный электрик", "Учитель", "Дизайнер"], correct: 0 },
                { question: "Что означает ЧПУ в станкостроении?", options: ["Числовое программное управление", "Чрезвычайное положение", "Частное предприятие"], correct: 0 }
            ],
            10: [
                { question: "Что такое честь для кадета?", options: ["Достоинство и верность принципам", "Наряд вне очереди", "Боевая награда"], correct: 0 },
                { question: "Что такое мужество?", options: ["Преодоление страха", "Трусость", "Безразличие"], correct: 0 },
                { question: "Чьё имя носит Пермское кадетское училище?", options: ["Ф. Кузьмина", "А. Романова", "М. Шолохова"], correct: 0 },
                { question: "Какое качество важнее всего для кадета?", options: ["Дисциплина", "Скорость", "Сила"], correct: 0 },
                { question: "Что значит «служить Отечеству»?", options: ["Защищать Родину", "Работать за деньги", "Путешествовать"], correct: 0 }
            ],
            11: [
                { question: "Кто создал первый космический корабль?", options: ["С.П. Королёв", "К.Э. Циолковский", "Ю.А. Гагарин"], correct: 0 },
                { question: "Как называется орбитальная станция?", options: ["МКС", "Салют", "Мир"], correct: 0 },
                { question: "Кто руководит космической отраслью России?", options: ["Роскосмос", "Росатом", "Роснефть"], correct: 0 },
                { question: "Что делают спутники дистанционного зондирования?", options: ["Фотографируют Землю", "Передают ТВ", "Ищут нефть"], correct: 0 },
                { question: "Как называется специалист, испытывающий космическую технику?", options: ["Инженер-испытатель", "Космонавт", "Астроном"], correct: 0 }
            ],
            12: [
                { question: "Что ищут собаки-сапёры?", options: ["Взрывчатку", "Еду", "Воду"], correct: 0 },
                { question: "Какая порода служит в кинологии Росгвардии?", options: ["Овчарка", "Болонка", "Пудель"], correct: 0 },
                { question: "Где готовят кинологов Росгвардии?", options: ["ПВИ", "МГУ", "СПбГУ"], correct: 0 },
                { question: "Как называется специалист по служебным собакам?", options: ["Кинолог", "Ветеринар", "Зоолог"], correct: 0 },
                { question: "Что означает верность для кинолога?", options: ["Не предавать", "Быть сильным", "Быстрым"], correct: 0 }
            ]
        };
        
        function getGrade(score) {
            if (score <= 2) return { grade: 2, name: "2 (неудовлетворительно)", color: "grade-2", message: "Нужно повторить материал" };
            if (score === 3) return { grade: 3, name: "3 (удовлетворительно)", color: "grade-3", message: "Минимальный проходной балл" };
            if (score === 4) return { grade: 4, name: "4 (хорошо)", color: "grade-4", message: "Хороший результат!" };
            return { grade: 5, name: "5 (отлично)", color: "grade-5", message: "Отличный результат!" };
        }
        
        function logout() {
            sessionStorage.removeItem('currentUser');
            window.location.href = 'login.html';
        }
        
        function loadTopic() {
            const lesson = lessonsData[topicId];
            if (!lesson) {
                window.location.href = 'cadet-courses.html';
                return;
            }
            
            document.title = `${lesson.title} | Кадет`;
            document.getElementById('topicTitle').textContent = lesson.title;
            document.getElementById('topicDescription').textContent = lesson.description;
            document.getElementById('questionsCount').textContent = '5';
            
            const videoContainer = document.getElementById('videoContainer');
            videoContainer.innerHTML = `<iframe src="${lesson.video}" frameborder="0" allowfullscreen></iframe>`;
            
            questions = allQuestions[topicId] || [];
            renderQuestions();
            checkIfAlreadyPassed();
        }
        
        function renderQuestions() {
            const container = document.getElementById('questionsContainer');
            if (questions.length === 0) {
                container.innerHTML = '<p style="color: #888;">Вопросы для этого занятия в разработке</p>';
                return;
            }
            
            container.innerHTML = questions.map((q, idx) => `
                <div class="question">
                    <div class="question-text">${idx + 1}. ${q.question}</div>
                    ${q.options.map((opt, optIdx) => `
                        <label class="option">
                            <input type="radio" name="q${idx}" value="${optIdx}" data-qidx="${idx}">
                            ${String.fromCharCode(65 + optIdx)}. ${opt}
                        </label>
                    `).join('')}
                </div>
            `).join('');
            
            document.querySelectorAll('input[type="radio"]').forEach(radio => {
                radio.addEventListener('change', (e) => {
                    const qIdx = parseInt(e.target.dataset.qidx);
                    userAnswers[qIdx] = parseInt(e.target.value);
                    updateProgress();
                });
            });
        }
        
        function updateProgress() {
            const answeredCount = Object.keys(userAnswers).length;
            const totalQuestions = questions.length;
            const percent = (answeredCount / totalQuestions) * 100;
            
            const progressBar = document.getElementById('progressBar');
            const progressFill = document.getElementById('progressFill');
            
            if (answeredCount > 0) {
                progressBar.style.display = 'block';
                progressFill.style.width = `${percent}%`;
            }
        }
        
        function checkIfAlreadyPassed() {
            const results = JSON.parse(localStorage.getItem('testResults') || '[]');
            const existing = results.find(r => r.cadetId === currentCadet.id && r.topicId === topicId);
            
            if (existing) {
                const gradeInfo = getGrade(existing.score);
                document.getElementById('testBlock').innerHTML = `
                    <div class="test-title">📝 Проверь свои знания</div>
                    <div class="already-passed">
                        ✅ Вы уже прошли тест по этой теме!<br>
                        Ваша оценка: <strong>${gradeInfo.name}</strong><br>
                        Результат: ${existing.score} из ${existing.totalQuestions} правильных ответов<br>
                        Дата прохождения: ${new Date(existing.completedAt).toLocaleString()}<br><br>
                        <a href="cadet-courses.html" style="color: #155724; font-weight: 600;">← Вернуться к курсу занятий</a>
                    </div>
                `;
            }
        }
        
        function submitTest() {
            const results = JSON.parse(localStorage.getItem('testResults') || '[]');
            const existing = results.find(r => r.cadetId === currentCadet.id && r.topicId === topicId);
            
            if (existing) {
                document.getElementById('resultMessage').innerHTML = '<div class="result result-grade-3">⚠️ Вы уже проходили этот тест. Повторное прохождение недоступно.</div>';
                return;
            }
            
            const missingQuestions = [];
            for (let i = 0; i < questions.length; i++) {
                if (userAnswers[i] === undefined) {
                    missingQuestions.push(i + 1);
                }
            }
            
            if (missingQuestions.length > 0) {
                document.getElementById('resultMessage').innerHTML = `<div class="result result-grade-3">❌ Вы ответили не на все вопросы!<br>Пропущены вопросы: ${missingQuestions.join(', ')}<br>Ответьте на все вопросы перед проверкой.</div>`;
                setTimeout(() => {
                    document.getElementById('resultMessage').innerHTML = '';
                }, 4000);
                return;
            }
            
            let score = 0;
            for (let i = 0; i < questions.length; i++) {
                if (userAnswers[i] === questions[i].correct) {
                    score++;
                }
            }
            
            saveTestResult(currentCadet.id, topicId, score, questions.length, userAnswers);
            
            const gradeInfo = getGrade(score);
            const resultDiv = document.getElementById('resultMessage');
            
            resultDiv.innerHTML = `
                <div class="result ${gradeInfo.color}">
                    🎓 Ваша оценка: <strong>${gradeInfo.name}</strong><br>
                    Правильных ответов: ${score} из ${questions.length}<br>
                    ${gradeInfo.message}<br><br>
                    <a href="cadet-courses.html" style="color: inherit; font-weight: 600;">← Вернуться к курсу занятий</a>
                </div>
            `;
            document.getElementById('submitBtn').style.display = 'none';
        }
        
        (function() {
            const user = getCurrentUser();
            if (!user || user.role !== 'cadet') {
                window.location.href = 'login.html';
                return;
            }
            currentCadet = user;
            
            // Получаем фото кадета
            const cadetPhotoUrl = typeof getCadetPhoto === 'function' ? getCadetPhoto(user.id) : null;
            
            // Аватар
            let avatarHtml = '';
            if (cadetPhotoUrl) {
                avatarHtml = `<img src="${cadetPhotoUrl}" class="cadet-avatar" alt="Фото">`;
            } else {
                avatarHtml = `<div class="cadet-avatar-placeholder">🎓</div>`;
            }
            
            // Вставляем в жёлтую обёртку
            document.getElementById('userInfoWrapper').innerHTML = `
                ${avatarHtml}
                <span class="user-name-text">${user.name} (взвод №${user.platoon})</span>
            `;
            
            loadTopic();
            document.getElementById('submitBtn')?.addEventListener('click', submitTest);
        })();
    </script>
